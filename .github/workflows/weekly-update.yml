name: Daily Price Update

on:
  
  workflow_dispatch: # Manual trigger from GitHub UI
    inputs:
      seed_only:
        description: 'Run seed script only (first-time setup)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -- Python setup ------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Seed Supabase from JSON files
        if: github.event.inputs.seed_only == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/seed_supabase.py

      - name: Run daily price scraper (businesses + fuel)
        if: github.event.inputs.seed_only != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERVO_SAVER_KEY: ${{ secrets.SERVO_SAVER_KEY }}
        run: python scripts/scrape_and_update.py

      - name: Run energy price scraper (Victorian Default Offer)
        if: github.event.inputs.seed_only != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/scrape_energy_prices.py

      # -- Node.js setup (grocery scraper + future JS scrapers) -------------
      - name: Set up Node.js
        if: github.event.inputs.seed_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node.js dependencies
        if: github.event.inputs.seed_only != 'true'
        run: npm install @supabase/supabase-js

      - name: Run grocery price scraper
        if: github.event.inputs.seed_only != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/scrape-groceries.js

      # -- ADD NEW SCRAPERS HERE ---------------------------------------------
      # Python example:
      # - name: Run <name> scraper
      #   if: github.event.inputs.seed_only != 'true'
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      #   run: python scripts/<your-script>.py
      #
      # Node.js example:
      # - name: Run <name> scraper
      #   if: github.event.inputs.seed_only != 'true'
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      #   run: node scripts/<your-script>.js
      # ---------------------------------------------------------------------

      - name: Log completion
        run: echo "All scrapers completed at $(date '+%Y-%m-%d %H:%M:%S UTC')"
